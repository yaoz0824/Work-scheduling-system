{% extends "base.html" %}

{% block title %}註冊帳號 - 打工排班最佳化系統{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-panel" style="max-width: 550px;">
        <div class="auth-header">
            <h1>註冊新帳號</h1>
            <p>建立管理員 (店長) 或打工員工帳戶</p>
        </div>

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">登入帳號 (Username) *</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="輸入登入帳號" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">密碼 (Password) *</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="輸入密碼" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="name" class="form-label">姓名 (Full Name) *</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="輸入真實姓名" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="role" class="form-label">註冊身分 (System Role)</label>
                <select id="role" name="role" class="form-control" onchange="toggleHours(this.value)">
                    <option value="staff">一般員工 (Staff)</option>
                    <option value="manager">管理員/店長 (Manager)</option>
                </select>
            </div>

            <!-- Staff limits -->
            <div id="hours-limits-container">
                <div class="form-group">
                    <label for="max_weekly_hours" class="form-label">每週最大工時上限 (小時)</label>
                    <input type="number" id="max_weekly_hours" name="max_weekly_hours" class="form-control" value="40.0" step="0.5" min="1">
                </div>

                <div class="form-group">
                    <label for="max_daily_hours" class="form-label">單日最長工時限制 (小時)</label>
                    <input type="number" id="max_daily_hours" name="max_daily_hours" class="form-control" value="8.0" step="0.5" min="1">
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 1.25rem;">建立帳戶</button>
        </form>

        <div class="auth-footer">
            已經有帳號了？ <a href="{{ url_for('auth.login_page') }}">立即登入</a>
        </div>
    </div>
</div>

<script>
    function toggleHours(role) {
        const hoursDiv = document.getElementById('hours-limits-container');
        if (role === 'manager') {
            hoursDiv.style.display = 'none';
        } else {
            hoursDiv.style.display = 'block';
        }
    }
</script>
{% endblock %}
