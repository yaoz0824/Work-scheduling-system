<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工時薪資小幫手</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('main.index') }}" class="brand">✨ 工時小幫手</a>
        <div class="nav-links">
            <a href="{{ url_for('main.index') }}">打卡首頁</a>
            <a href="{{ url_for('record.list_records') }}">歷史紀錄</a>
            <a href="{{ url_for('setting.index') }}">工作設定</a>
        </div>
    </nav>

    <div class="container">
        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        {% block content %}{% endblock %}
    </div>
</body>
</html>
